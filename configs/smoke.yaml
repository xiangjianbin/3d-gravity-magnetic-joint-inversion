# Smoke test configuration — minimal training for quick validation
# ================================================================

model:
  in_channels: 2
  base_channels: 64
  backbone_out_channels: 256
  aspp_dilation_rates: [6, 12, 18]

data:
  data_dir: data/
  batch_size: 2
  num_workers: 0
  train_split: 0.7
  val_split: 0.2

training:
  epochs: 2
  lr: 1e-3
  weight_decay: 1e-5
  use_amp: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  seed: 42

output:
  checkpoint_dir: checkpoints/
  log_dir: logs/
  result_dir: results/

device: auto
