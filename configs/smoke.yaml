# Smoke test configuration -- quick validation of the full pipeline
# Small epochs, small batch size, fast iteration

# Data
data_dir: data
batch_size: 2
num_workers: 0

# Model
backbone_channels: 64
aspp_out_channels: 40
leaky_slope: 0.01

# Training
seed: 42
epochs: 3
lr: 1e-3
betas: [0.9, 0.999]
weight_decay: 1e-5

# LR scheduler: 'cosine', 'step', 'plateau', or null
scheduler: step
step_size: 2
gamma: 0.5

# Loss
task_weights:
  task1: 1.0
  task2: 1.0
  task3: 1.0
  task4: 1.0
  task5: 1.0
leaky_relu_lambda: 1e-5

# Regularization / stability
grad_clip: 1.0
use_amp: true
early_stopping_patience: 100  # disabled for smoke test (won't trigger in 3 epochs)

# Output
output_dir: results/smoke_test
save_every: 3
