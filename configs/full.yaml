# Full training configuration for gravity-magnetic joint inversion
# Based on Fang et al., IEEE TGRS Vol.63, 2025

# Data
data_dir: data
batch_size: 320         # Measured optimal: 24.9 GB / 31.6 GB = 78.7% VRAM (FP32, see docs/GPU_ALLOC_PLAN.md)
num_workers: 4

# Model architecture
backbone_channels: 64   # U-Net base filter count
aspp_out_channels: 40   # ASPP output channels (= task head input channels)
leaky_slope: 0.01       # Leaky-ReLU negative slope (paper default)

# Training hyperparameters
seed: 42
epochs: 90              # ~90 epochs per Fig.5 training curves
lr: 1e-3                # Initial learning rate (from paper analysis)
betas: [0.9, 0.999]     # Adam beta1, beta2 (standard defaults)
weight_decay: 1e-5      # L2 regularization on parameters

# Learning rate scheduler
scheduler: cosine       # Options: 'cosine', 'step', 'plateau'
# For 'step' scheduler:
step_size: 30
gamma: 0.1

# Loss function configuration
task_weights:
  task1: 1.0            # Independent gravity inversion (MSE)
  task2: 1.0            # Independent magnetic inversion (MSE)
  task3: 1.0            # Structural similarity (BCE)
  task4: 1.0            # Joint gravity inversion (MSE)
  task5: 1.0            # Joint magnetic inversion (MSE)
leaky_relu_lambda: 1e-5 # L2 weight penalty coefficient (Leaky-ReLU regularizer)

# Training stability
grad_clip: 1.0          # Max gradient norm for clipping
use_amp: false          # FP32 for paper alignment; set true + batch_size=512 for faster training (see GPU_ALLOC_PLAN.md)
early_stopping_patience: 15  # Stop if no improvement for N epochs

# Output
output_dir: results/full_training
save_every: 10          # Save checkpoint every N epochs (plus every 5 epochs for resume safety)
